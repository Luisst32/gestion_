name: Django CI
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
jobs:
  test:
    runs-on: ubuntu-latest
    # Configuramos un servicio de PostgreSQL para que los tests puedan ejecutarse
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gestion_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ''
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django Tests
      # Configuramos las variables de entorno que tu settings.py podría usar,
      # o para asegurarnos que se conecte correctamente al servicio de arriba.
      run: |
        python manage.py test

    - name: Build Docker Image
      run: |
        docker build -t gestion-web:latest .
        docker save gestion-web:latest > gestion-web.tar

    - name: Upload Docker Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: gestion-web.tar
