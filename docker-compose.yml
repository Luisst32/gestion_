services:
  db:
    image: postgres:15
    container_name: gestion_postgres
    environment:
      - POSTGRES_DB=gestion_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"

  web:
    build: .
    image: gestion-web
    container_name: gestion_django
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
    depends_on:
      - db
